services:

  postgres:
    image: postgres:17
    container_name: ticketscale-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ticketscale
      POSTGRES_USER: ticketscale
      POSTGRES_PASSWORD: ticketscale
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ticketscale-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:4-management
    container_name: ticketscale-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ticketscale
      RABBITMQ_DEFAULT_PASS: ticketscale

  # SonarQube Local (Alternativa ao SonarCloud)
  # Execute: docker compose up -d sonarqube
  # Acesse: http://localhost:9000 (admin/admin)
  sonarqube:
    image: sonarqube:lts-community
    container_name: ticketscale-sonarqube
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs

volumes:
  postgres_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
