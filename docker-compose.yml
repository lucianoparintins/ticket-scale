services:

  postgres:
    image: postgres:17
    container_name: ticketscale-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ticketscale
      POSTGRES_USER: ticketscale
      POSTGRES_PASSWORD: ticketscale
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ticketscale-network

  redis:
    image: redis:7
    container_name: ticketscale-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - ticketscale-network

  rabbitmq:
    image: rabbitmq:4-management
    container_name: ticketscale-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ticketscale
      RABBITMQ_DEFAULT_PASS: ticketscale
    networks:
      - ticketscale-network

  # SonarQube Local (Alternativa ao SonarCloud)
  # Execute: docker compose up -d sonarqube
  # Acesse: http://localhost:9000 (admin/admin)
  sonarqube:
    image: sonarqube:lts-community
    container_name: ticketscale-sonarqube
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - ticketscale-network

  # Nginx Load Balancer
  # Serve como ponto único de entrada, load balancing e reverse proxy
  nginx:
    image: nginx:alpine
    container_name: ticketscale-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/upstream.conf:/etc/nginx/upstream.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
    networks:
      - ticketscale-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # API TicketScale (perfil dev - single instance)
  # Em produção, usar docker-compose.prod.yml com Docker Swarm
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ticketscale-api
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:postgresql://postgres:5432/ticketscale
      DB_USERNAME: ticketscale
      DB_PASSWORD: ticketscale
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ticketscale
      RABBITMQ_PASSWORD: ticketscale
      PASSWORD_PEPPER: ${PASSWORD_PEPPER:-dev-pepper-change-in-prod}
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - ticketscale-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  nginx_logs:

networks:
  ticketscale-network:
    driver: bridge
