# Docker Compose para Produção com Docker Swarm
# 
# Uso:
# 1. Inicializar Swarm: docker swarm init
# 2. Deploy: docker stack deploy -c docker-compose.prod.yml ticketscale
# 3. Listar serviços: docker service ls
# 4. Escalar manualmente: docker service scale ticketscale_api=5
# 5. Remover: docker stack rm ticketscale
#
# Auto-scaling:
# O Docker Swarm não suporta auto-scaling automático nativamente.
# Para auto-scaling dinâmico baseado em CPU/Memory, use:
# - Docker Swarm com swarm-autoscale (terceiros)
# - Kubernetes (recomendado para auto-scaling avançado)
# - Script customizado monitorando métricas do Prometheus

services:

  postgres:
    image: postgres:17
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    environment:
      POSTGRES_DB: ticketscale
      POSTGRES_USER: ticketscale
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ticketscale-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketscale -d ticketscale"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - ticketscale-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  rabbitmq:
    image: rabbitmq:4-management-alpine
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    environment:
      RABBITMQ_DEFAULT_USER: ticketscale
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD required}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - ticketscale-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # API TicketScale com auto-scaling
  api:
    image: ticketscale-api:${VERSION:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    deploy:
      mode: replicated
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      # Health check para load balancing
      healthcheck:
        test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
        interval: 30s
        timeout: 10s
        retries: 3
        start_period: 60s
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/ticketscale
      DB_USERNAME: ticketscale
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ticketscale
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD required}
      PASSWORD_PEPPER: ${PASSWORD_PEPPER:?PASSWORD_PEPPER required}
      JAVA_TOOL_OPTIONS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - ticketscale-network

  # Nginx Load Balancer
  nginx:
    image: nginx:alpine
    deploy:
      mode: replicated
      replicas: 2
      update_config:
        parallelism: 1
        delay: 5s
        order: start-first
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      placement:
        constraints:
          - node.role == manager
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
    networks:
      - ticketscale-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  nginx_logs:

networks:
  ticketscale-network:
    driver: overlay
    attachable: true
