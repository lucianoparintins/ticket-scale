spring:
  application:
    name: TicketScale

  # --- Banco de Dados ---
  datasource:
    url: jdbc:postgresql://localhost:5432/ticketscale
    username: ticketscale
    password: ticketscale
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  # --- Redis ---
  data:
    redis:
      host: localhost
      port: 6379

  # --- RabbitMQ ---
  rabbitmq:
    host: localhost
    port: 5672
    username: ticketscale
    password: ticketscale

  # --- Segurança ---
  security:
    user:
      name: admin
      password: admin

api:
  security:
    token:
      secret: ${JWT_SECRET:12345678}


server:
  port: 8080
