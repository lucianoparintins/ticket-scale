# Upstream configuration para API TicketScale
# Suporta auto-scaling dinâmico com Docker Swarm
#
# No Docker Swarm, o DNS interno resolve 'tasks.ticketscale-api'
# para todos os containers do serviço, permitindo load balancing automático

upstream ticketscale_api {
    least_conn;
    
    # Docker Swarm DNS round-robin
    # Em produção, descomente a linha abaixo e comente os servidores estáticos
    # server tasks.ticketscale-api:8080;
    
    # Desenvolvimento (container nomeado)
    # Nota: Em dev, usamos docker compose com nome fixo 'ticketscale-api'
    server api:8080;
    
    # Keepalive para melhor performance
    keepalive 32;
}

# Upstream para arquivos estáticos (dashboard administrativo)
# Usa o mesmo upstream da API pois os arquivos são servidos pela própria API
upstream ticketscale_static {
    least_conn;
    
    # Docker Swarm DNS round-robin
    # server tasks.ticketscale-api:8080;
    
    # Desenvolvimento
    server api:8080;
    
    keepalive 16;
}
